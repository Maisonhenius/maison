<!DOCTYPE html>
<html lang="en" data-turbo="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Password - Maison Henius</title>
  <meta name="description" content="Set a new password for your Maison Henius account.">

  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/favicon-32x32.png" type="image/png">
  <link rel="icon" href="/static/assets/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0a08;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .auth {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .auth__logo {
      display: inline-block;
      margin-bottom: 3rem;
    }

    .auth__logo img {
      height: 60px;
      width: auto;
      display: block;
    }

    .auth__heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.6rem, 2.5vw, 2rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .auth__sub {
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(245, 240, 232, 0.65);
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
    }

    .auth__form {
      display: flex;
      flex-direction: column;
      gap: 0;
      text-align: left;
    }

    .auth__input {
      background: transparent;
      border: 1px solid rgba(233, 219, 144, 0.25);
      padding: 0.9rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #f5f0e8;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .auth__input::placeholder {
      color: rgba(245, 240, 232, 0.3);
    }

    .auth__input:focus {
      border-color: rgba(233, 219, 144, 0.5);
    }

    .auth__input + .auth__input {
      margin-top: -1px;
    }

    .auth__btn {
      width: 100%;
      margin-top: 1.8rem;
      background: #e9db90;
      border: 1px solid #e9db90;
      padding: 1rem 1.8rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a08;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, opacity 0.3s ease;
    }

    .auth__btn:hover {
      background: transparent;
      color: #e9db90;
    }

    .auth__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .auth__error {
      font-weight: 300;
      font-size: 0.7rem;
      color: #d4614b;
      letter-spacing: 0.02em;
      margin-top: 1rem;
      display: none;
    }

    .auth__success {
      display: none;
    }

    .auth__success-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      color: #e9db90;
    }

    .auth__success-heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.4rem, 2.2vw, 1.8rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.8rem;
    }

    .auth__success-sub {
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.4);
      letter-spacing: 0.03em;
      margin-bottom: 2rem;
    }

    .auth__success-link {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a08;
      background: #e9db90;
      border: 1px solid #e9db90;
      padding: 1rem 2.5rem;
      text-decoration: none;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .auth__success-link:hover {
      background: transparent;
      color: #e9db90;
    }

    .auth__expired {
      display: none;
    }

    .auth__expired-heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.4rem, 2.2vw, 1.8rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.8rem;
    }

    .auth__expired-sub {
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.4);
      letter-spacing: 0.03em;
      margin-bottom: 2rem;
    }

    .auth__expired-link {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e9db90;
      text-decoration: none;
      border: 1px solid rgba(233, 219, 144, 0.25);
      padding: 1rem 2.5rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .auth__expired-link:hover {
      background: #e9db90;
      color: #0a0a08;
    }

    .auth { visibility: hidden; }

    @media (prefers-reduced-motion: reduce) {
      .auth { visibility: visible !important; opacity: 1 !important; }
    }

    /* ── Mobile: prevent iOS auto-zoom + larger touch targets ── */
    @media (max-width: 768px) {
      .auth__input {
        font-size: 16px !important;
        padding: 1rem 1.2rem;
      }
      .auth__btn {
        font-size: 0.75rem;
        padding: 1.1rem 1.8rem;
        min-height: 48px;
      }
      .auth__footer a {
        display: inline-block;
        padding: 0.5rem 0.3rem;
      }
    }
  </style>
</head>
<body>

  <div class="auth">
    <a href="/" class="auth__logo">
      <img src="/static/assets/images/logo.svg" alt="Maison Henius">
    </a>

    <!-- Reset form -->
    <div id="resetStep">
      <h1 class="auth__heading">Choose a New Password</h1>
      <p class="auth__sub">Enter your new password below</p>

      <form class="auth__form" id="resetForm">
        <input class="auth__input" type="password" name="password" placeholder="New password" required autocomplete="new-password">
        <input class="auth__input" type="password" name="confirm" placeholder="Confirm new password" required autocomplete="new-password">
        <button type="submit" class="auth__btn" id="resetBtn">Reset Password</button>
      </form>

      <p class="auth__error" id="resetError"></p>
    </div>

    <!-- Success state -->
    <div class="auth__success" id="successStep">
      <svg class="auth__success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <h2 class="auth__success-heading">Password Updated</h2>
      <p class="auth__success-sub">Your password has been successfully reset.</p>
      <a href="/login" class="auth__success-link">Sign In</a>
    </div>

    <!-- Expired/invalid link state -->
    <div class="auth__expired" id="expiredStep">
      <h2 class="auth__expired-heading">Link Expired</h2>
      <p class="auth__expired-sub">This reset link has expired or is invalid. Please request a new one.</p>
      <a href="/forgot-password" class="auth__expired-link">Request New Link</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script>
    (function() {
      var resetStep = document.getElementById('resetStep');
      var successStep = document.getElementById('successStep');
      var expiredStep = document.getElementById('expiredStep');
      var form = document.getElementById('resetForm');
      var btn = document.getElementById('resetBtn');
      var errorEl = document.getElementById('resetError');

      // Extract tokens from URL hash (Supabase redirects with #access_token=...&refresh_token=...)
      var hashParams = new URLSearchParams(window.location.hash.substring(1));
      var accessToken = hashParams.get('access_token') || '';
      var refreshToken = hashParams.get('refresh_token') || '';
      var type = hashParams.get('type') || '';

      // If no tokens, show expired state
      if (!accessToken || type !== 'recovery') {
        resetStep.style.display = 'none';
        expiredStep.style.display = 'block';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var password = form.querySelector('[name="password"]').value;
        var confirm = form.querySelector('[name="confirm"]').value;

        errorEl.style.display = 'none';

        if (password.length < 6) {
          errorEl.textContent = 'Password must be at least 6 characters';
          errorEl.style.display = 'block';
          return;
        }

        if (password !== confirm) {
          errorEl.textContent = 'Passwords do not match';
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'RESETTING...';

        try {
          var res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              access_token: accessToken,
              refresh_token: refreshToken,
              password: password
            })
          });
          var data = await res.json();

          if (data.success) {
            resetStep.style.display = 'none';
            successStep.style.display = 'block';
            if (typeof gsap !== 'undefined') {
              gsap.fromTo(successStep, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.6 });
              gsap.fromTo('.auth__success-icon', { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.5, delay: 0.15, ease: 'back.out(1.7)' });
            }
            // Clear hash from URL
            history.replaceState(null, '', window.location.pathname);
          } else {
            if (data.error && (data.error.toLowerCase().includes('expired') || data.error.toLowerCase().includes('invalid'))) {
              resetStep.style.display = 'none';
              expiredStep.style.display = 'block';
            } else {
              errorEl.textContent = data.error || 'Something went wrong';
              errorEl.style.display = 'block';
            }
          }
        } catch (err) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          errorEl.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'RESET PASSWORD';
      });

      // GSAP entrance
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && typeof gsap !== 'undefined') {
        var auth = document.querySelector('.auth');
        gsap.set(auth, { visibility: 'visible', opacity: 0, y: 20 });
        gsap.to(auth, { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out', delay: 0.15 });
      } else {
        document.querySelector('.auth').style.visibility = 'visible';
      }
    })();
  </script>

</body>
</html>
