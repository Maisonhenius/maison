<!DOCTYPE html>
<html lang="en" data-turbo="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Maison Henius</title>
  <meta name="description" content="Reset your Maison Henius account password.">

  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/favicon-32x32.png" type="image/png">
  <link rel="icon" href="/static/assets/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"></noscript>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0a08;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .auth {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .auth__logo {
      display: inline-block;
      margin-bottom: 3rem;
    }

    .auth__logo img {
      height: 60px;
      width: auto;
      display: block;
    }

    .auth__heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.6rem, 2.5vw, 2rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .auth__sub {
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(245, 240, 232, 0.65);
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
    }

    .auth__form {
      display: flex;
      flex-direction: column;
      gap: 0;
      text-align: left;
    }

    .auth__input {
      background: transparent;
      border: 1px solid rgba(233, 219, 144, 0.25);
      padding: 0.9rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #f5f0e8;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .auth__input::placeholder {
      color: rgba(245, 240, 232, 0.3);
    }

    .auth__input:focus {
      border-color: rgba(233, 219, 144, 0.5);
    }

    .auth__btn {
      width: 100%;
      margin-top: 1.8rem;
      background: #e9db90;
      border: 1px solid #e9db90;
      padding: 1rem 1.8rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a08;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, opacity 0.3s ease;
    }

    .auth__btn:hover {
      background: transparent;
      color: #e9db90;
    }

    .auth__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .auth__error {
      font-weight: 300;
      font-size: 0.7rem;
      color: #d4614b;
      letter-spacing: 0.02em;
      margin-top: 1rem;
      display: none;
    }

    .auth__success {
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.5);
      letter-spacing: 0.03em;
      line-height: 1.7;
      margin-top: 1rem;
      display: none;
    }

    .auth__footer {
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(245, 240, 232, 0.35);
      letter-spacing: 0.03em;
      margin-top: 2rem;
    }

    .auth__footer a {
      color: #e9db90;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .auth__footer a:hover {
      opacity: 0.7;
    }

    .auth { visibility: hidden; }

    @media (prefers-reduced-motion: reduce) {
      .auth { visibility: visible !important; opacity: 1 !important; }
    }

    /* ── Mobile: prevent iOS auto-zoom + larger touch targets ── */
    @media (max-width: 768px) {
      .auth__input {
        font-size: 16px !important;
        padding: 1rem 1.2rem;
      }
      .auth__btn {
        font-size: 0.75rem;
        padding: 1.1rem 1.8rem;
        min-height: 48px;
      }
      .auth__footer a {
        display: inline-block;
        padding: 0.5rem 0.3rem;
      }
    }
  </style>
</head>
<body>

  <div class="auth">
    <a href="/" class="auth__logo">
      <img src="/static/assets/images/logo.svg" alt="Maison Henius">
    </a>

    <h1 class="auth__heading">Reset Your Password</h1>
    <p class="auth__sub">Enter your email and we'll send you a reset link</p>

    <form class="auth__form" id="forgotForm">
      <input class="auth__input" type="email" name="email" placeholder="Email address" required autocomplete="email">
      <button type="submit" class="auth__btn" id="forgotBtn">Send Reset Link</button>
    </form>

    <p class="auth__error" id="forgotError"></p>
    <p class="auth__success" id="forgotSuccess">If an account exists with this email, we've sent a password reset link. Check your inbox.</p>

    <p class="auth__footer">Remember your password? <a href="/login">Sign in</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script>
    (function() {
      var form = document.getElementById('forgotForm');
      var btn = document.getElementById('forgotBtn');
      var errorEl = document.getElementById('forgotError');
      var successEl = document.getElementById('forgotSuccess');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = form.querySelector('[name="email"]').value.trim();
        if (!email) return;

        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'SENDING...';

        try {
          var res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          });
          var data = await res.json();

          if (data.success) {
            form.style.display = 'none';
            successEl.style.display = 'block';
            if (typeof gsap !== 'undefined') {
              gsap.fromTo(successEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });
            }
          } else {
            errorEl.textContent = data.error || 'Something went wrong';
            errorEl.style.display = 'block';
          }
        } catch (err) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          errorEl.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'SEND RESET LINK';
      });

      // GSAP entrance
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && typeof gsap !== 'undefined') {
        var auth = document.querySelector('.auth');
        gsap.set(auth, { visibility: 'visible', opacity: 0, y: 20 });
        gsap.to(auth, { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out', delay: 0.15 });
      } else {
        document.querySelector('.auth').style.visibility = 'visible';
      }
    })();
  </script>

</body>
</html>
