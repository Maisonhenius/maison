<!DOCTYPE html>
<html lang="en" data-turbo="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Maison Henius</title>
  <meta name="description" content="Create your Maison Henius account.">

  <!-- Favicons -->
  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/favicon-32x32.png" type="image/png">
  <link rel="icon" href="/static/assets/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"></noscript>

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.23/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/dist/stimulus.js"
    }
  }
  </script>
  <script type="module" src="/static/js/application.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0a08;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Auth container ── */
    .auth {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* ── Logo ── */
    .auth__logo {
      display: inline-block;
      margin-bottom: 3rem;
    }

    .auth__logo img {
      height: 252px;
      width: auto;
      display: block;
    }

    /* ── Headings ── */
    .auth__heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.6rem, 2.5vw, 2rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .auth__sub {
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(245, 240, 232, 0.65);
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
    }

    /* ── Form ── */
    .auth__form {
      display: flex;
      flex-direction: column;
      gap: 0;
      text-align: left;
    }

    .auth__input {
      background: transparent;
      border: 1px solid rgba(233, 219, 144, 0.25);
      padding: 0.9rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #f5f0e8;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .auth__input::placeholder {
      color: rgba(245, 240, 232, 0.3);
    }

    .auth__input:focus {
      border-color: rgba(233, 219, 144, 0.5);
    }

    .auth__input + .auth__input {
      margin-top: -1px;
    }

    /* ── Submit button ── */
    .auth__btn {
      width: 100%;
      margin-top: 1.8rem;
      background: #e9db90;
      border: 1px solid #e9db90;
      padding: 1rem 1.8rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a08;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, opacity 0.3s ease;
    }

    .auth__btn:hover {
      background: transparent;
      color: #e9db90;
    }

    .auth__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Error message ── */
    .auth__error {
      font-weight: 300;
      font-size: 0.7rem;
      color: #d4614b;
      letter-spacing: 0.02em;
      margin-top: 1rem;
      display: none;
    }

    /* ── Footer link ── */
    .auth__footer {
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(245, 240, 232, 0.35);
      letter-spacing: 0.03em;
      margin-top: 2rem;
    }

    .auth__footer a {
      color: #e9db90;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .auth__footer a:hover {
      opacity: 0.7;
    }

    /* ── GSAP initial state ── */
    .auth { visibility: hidden; }

    @media (prefers-reduced-motion: reduce) {
      .auth { visibility: visible !important; opacity: 1 !important; }
    }

    /* ── Mobile: prevent iOS auto-zoom + larger touch targets ── */
    @media (max-width: 768px) {
      .auth__input {
        font-size: 16px !important;
        padding: 1rem 1.2rem;
      }
      .auth__btn {
        font-size: 0.75rem;
        padding: 1.1rem 1.8rem;
        min-height: 48px;
      }
      .auth__footer a {
        display: inline-block;
        padding: 0.7rem 0.5rem;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>

  <div class="auth">
    <a href="/" class="auth__logo">
      <img src="/static/assets/images/logotype.webp" alt="Maison Henius">
    </a>

    <h1 class="auth__heading">Create Your Account</h1>
    <p class="auth__sub">Join the Maison Henius world</p>

    <form class="auth__form" id="signupForm">
      <input class="auth__input" type="text" name="full_name" placeholder="Full name" required autocomplete="name">
      <input class="auth__input" type="email" name="email" placeholder="Email address" required autocomplete="email">
      <input class="auth__input" type="password" name="password" placeholder="Password" required autocomplete="new-password">
      <input class="auth__input" type="password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
      <button type="submit" class="auth__btn" id="signupBtn">Create Account</button>
    </form>

    <p class="auth__error" id="signupError"></p>

    <p class="auth__footer">Already have an account? <a href="/login" id="loginLink">Sign in</a></p>
  </div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script>
    (function() {
      var form = document.getElementById('signupForm');
      var signupBtn = document.getElementById('signupBtn');
      var errorEl = document.getElementById('signupError');

      // Read redirect destination from URL query params
      var urlParams = new URLSearchParams(window.location.search);
      var redirectTo = urlParams.get('redirect') || '/profile';

      // Pass redirect param through to login link
      var loginLink = document.getElementById('loginLink');
      if (loginLink && redirectTo !== '/profile') {
        loginLink.href = '/login?redirect=' + encodeURIComponent(redirectTo);
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var full_name = form.querySelector('[name="full_name"]').value;
        var email = form.querySelector('[name="email"]').value;
        var password = form.querySelector('[name="password"]').value;
        var confirmPassword = form.querySelector('[name="confirm_password"]').value;

        errorEl.style.display = 'none';

        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match';
          errorEl.style.display = 'block';
          return;
        }

        signupBtn.disabled = true;
        signupBtn.textContent = 'CREATING ACCOUNT...';

        try {
          var res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email, password: password, full_name: full_name})
          });
          var data = await res.json();

          if (data.success && data.needs_confirmation) {
            /* Show confirmation message */
            var authEl = document.querySelector('.auth');
            var formWrap = document.querySelector('.auth__form');
            var footerEl = document.querySelector('.auth__footer');
            if (formWrap) formWrap.style.display = 'none';
            if (footerEl) footerEl.style.display = 'none';

            document.querySelector('.auth__heading').textContent = 'Check Your Email';
            document.querySelector('.auth__sub').textContent = 'We sent a confirmation link to ' + email + '. Click the link to activate your account, then sign in.';

            var loginBtn = document.createElement('a');
            loginBtn.href = '/login';
            loginBtn.textContent = 'Go to Sign In';
            loginBtn.style.cssText = 'display:inline-block;margin-top:2rem;background:#e9db90;border:1px solid #e9db90;padding:1rem 2.5rem;font-family:Montserrat,sans-serif;font-weight:400;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#0a0a08;text-decoration:none;transition:background 0.3s ease,color 0.3s ease;';
            authEl.appendChild(loginBtn);

            if (typeof gsap !== 'undefined') {
              gsap.fromTo('.auth__heading', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 });
              gsap.fromTo('.auth__sub', { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 0.15 });
              gsap.fromTo(loginBtn, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, delay: 0.3 });
            }
          } else if (data.success) {
            /* Direct login (shouldn't happen but fallback) */
            localStorage.setItem('maison_auth', JSON.stringify({
              access_token: data.access_token,
              user: data.user
            }));
            window.location.href = redirectTo;
          } else {
            errorEl.textContent = data.error || 'Could not create account';
            errorEl.style.display = 'block';
            signupBtn.disabled = false;
            signupBtn.textContent = 'CREATE ACCOUNT';
          }
        } catch (err) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          errorEl.style.display = 'block';
          signupBtn.disabled = false;
          signupBtn.textContent = 'CREATE ACCOUNT';
        }
      });

      // GSAP entrance
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && typeof gsap !== 'undefined') {
        var auth = document.querySelector('.auth');
        gsap.set(auth, { visibility: 'visible', opacity: 0, y: 20 });
        gsap.to(auth, { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out', delay: 0.15 });
      } else {
        document.querySelector('.auth').style.visibility = 'visible';
      }
    })();
  </script>

</body>
</html>
