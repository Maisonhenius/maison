<!DOCTYPE html>
<html lang="en" data-turbo="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Maison Henius</title>
  <meta name="description" content="Sign in to your Maison Henius account.">

  <!-- Favicons -->
  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/favicon-32x32.png" type="image/png">
  <link rel="icon" href="/static/assets/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"></noscript>

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.23/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/dist/stimulus.js"
    }
  }
  </script>
  <script type="module" src="/static/js/application.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0a08;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Auth container ── */
    .auth {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* ── Logo ── */
    .auth__logo {
      display: inline-block;
      margin-bottom: 3rem;
    }

    .auth__logo img {
      height: 252px;
      width: auto;
      display: block;
    }

    /* ── Headings ── */
    .auth__heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.6rem, 2.5vw, 2rem);
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .auth__sub {
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(245, 240, 232, 0.65);
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
    }

    /* ── Form ── */
    .auth__form {
      display: flex;
      flex-direction: column;
      gap: 0;
      text-align: left;
    }

    .auth__input {
      background: transparent;
      border: 1px solid rgba(233, 219, 144, 0.25);
      padding: 0.9rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #f5f0e8;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .auth__input::placeholder {
      color: rgba(245, 240, 232, 0.3);
    }

    .auth__input:focus {
      border-color: rgba(233, 219, 144, 0.5);
    }

    /* Collapse shared borders between stacked inputs */
    .auth__input + .auth__input {
      margin-top: -1px;
    }

    /* ── Submit button ── */
    .auth__btn {
      width: 100%;
      margin-top: 1.8rem;
      background: #e9db90;
      border: 1px solid #e9db90;
      padding: 1rem 1.8rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a08;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, opacity 0.3s ease;
    }

    .auth__btn:hover {
      background: transparent;
      color: #e9db90;
    }

    .auth__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Error message ── */
    .auth__error {
      font-weight: 300;
      font-size: 0.7rem;
      color: #d4614b;
      letter-spacing: 0.02em;
      margin-top: 1rem;
      display: none;
    }

    /* ── Footer link ── */
    .auth__footer {
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(245, 240, 232, 0.35);
      letter-spacing: 0.03em;
      margin-top: 2rem;
    }

    .auth__footer a {
      color: #e9db90;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .auth__footer a:hover {
      opacity: 0.7;
    }

    /* ── GSAP initial state ── */
    .auth { visibility: hidden; }

    @media (prefers-reduced-motion: reduce) {
      .auth { visibility: visible !important; opacity: 1 !important; }
    }

    /* ── Mobile: prevent iOS auto-zoom + larger touch targets ── */
    @media (max-width: 768px) {
      .auth__input {
        font-size: 16px !important;
        padding: 1rem 1.2rem;
      }
      .auth__btn {
        font-size: 0.75rem;
        padding: 1.1rem 1.8rem;
        min-height: 48px;
      }
      .auth__footer a {
        display: inline-block;
        padding: 0.7rem 0.5rem;
        min-height: 44px;
      }
    }

    /* ── Forgot password link: clean :hover instead of inline JS ── */
    .auth__footer .auth__forgot {
      color: rgba(245, 240, 232, 0.55);
      transition: color 0.3s ease;
    }
    .auth__footer .auth__forgot:hover,
    .auth__footer .auth__forgot:focus-visible {
      color: #e9db90;
      outline: none;
    }
  </style>
</head>
<body>

  <div class="auth">
    <a href="/" class="auth__logo">
      <img src="/static/assets/images/logotype.webp" alt="Maison Henius">
    </a>

    <h1 class="auth__heading">Welcome Back</h1>
    <p class="auth__sub">Sign in to your account</p>

    <form class="auth__form" id="loginForm">
      <input class="auth__input" type="email" name="email" placeholder="Email address" required autocomplete="email">
      <input class="auth__input" type="password" name="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="auth__btn" id="loginBtn">Sign In</button>
    </form>

    <p class="auth__error" id="loginError"></p>

    <p class="auth__footer" style="margin-top: 1.2rem;"><a href="/forgot-password" class="auth__forgot">Forgot password?</a></p>
    <p class="auth__footer">Don't have an account? <a href="/signup" id="signupLink">Create one</a></p>
  </div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script>
    (function() {
      var form = document.getElementById('loginForm');
      var loginBtn = document.getElementById('loginBtn');
      var errorEl = document.getElementById('loginError');

      // Read redirect destination from URL query params
      var urlParams = new URLSearchParams(window.location.search);
      var redirectTo = urlParams.get('redirect') || '/profile';

      // Pass redirect param through to signup link
      var signupLink = document.getElementById('signupLink');
      if (signupLink && redirectTo !== '/profile') {
        signupLink.href = '/signup?redirect=' + encodeURIComponent(redirectTo);
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = form.querySelector('[name="email"]').value;
        var password = form.querySelector('[name="password"]').value;

        errorEl.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.textContent = 'SIGNING IN...';

        try {
          var res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email, password: password})
          });
          var data = await res.json();

          if (data.success) {
            localStorage.setItem('maison_auth', JSON.stringify({
              access_token: data.access_token,
              user: data.user
            }));
            // Sync cart before redirect
            if (typeof MaisonCart !== 'undefined' && MaisonCart.sync) {
              MaisonCart.sync().then(function() {
                window.location.href = redirectTo;
              });
            } else {
              // MaisonCart not loaded on login page, do inline sync
              var localCart = [];
              try { localCart = JSON.parse(localStorage.getItem('maison_cart')) || []; } catch(e) {}
              if (localCart.length > 0) {
                fetch('/api/cart/sync', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + data.access_token
                  },
                  body: JSON.stringify({ items: localCart })
                }).then(function(r) { return r.json(); }).then(function(syncData) {
                  if (syncData.items) {
                    var merged = syncData.items.map(function(item) {
                      return { id: item.product_id, name: item.product_name, family: item.product_family || '', price: item.product_price || 284, image: item.product_image || '', quantity: item.quantity || 1 };
                    });
                    localStorage.setItem('maison_cart', JSON.stringify(merged));
                  }
                  window.location.href = redirectTo;
                }).catch(function() { window.location.href = redirectTo; });
              } else {
                window.location.href = redirectTo;
              }
            }
          } else {
            errorEl.textContent = data.error || 'Invalid credentials';
            errorEl.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = 'SIGN IN';
          }
        } catch (err) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          errorEl.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'SIGN IN';
        }
      });

      // GSAP entrance
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && typeof gsap !== 'undefined') {
        var auth = document.querySelector('.auth');
        gsap.set(auth, { visibility: 'visible', opacity: 0, y: 20 });
        gsap.to(auth, { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out', delay: 0.15 });
      } else {
        document.querySelector('.auth').style.visibility = 'visible';
      }
    })();
  </script>

</body>
</html>
